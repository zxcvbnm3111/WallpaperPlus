name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        run: |
          git clone https://github.com/${{ github.repository }}.git .
          git checkout ${{ github.ref_name }}
      
      - name: Install Java 17
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https
          wget -O- https://apt.corretto.aws/corretto.key | sudo apt-key add -
          sudo add-apt-repository 'deb https://apt.corretto.aws stable main'
          sudo apt-get update
          sudo apt-get install -y java-17-amazon-corretto-jdk
          java -version
          javac -version
      
      - name: Install other dependencies
        run: |
          sudo apt-get install -y python3-pil curl unzip
      
      - name: Download Android SDK
        run: |
          mkdir -p /opt/android-sdk
          cd /opt/android-sdk
          curl -L -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/bin cmdline-tools/lib cmdline-tools/NOTICE.txt cmdline-tools/source.properties cmdline-tools/latest/ 2>/dev/null || true
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
      
      - name: Download Gradle
        run: |
          curl -L -o gradle-8.2-bin.zip https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH=$PATH:$(pwd)/gradle-8.2/bin
          gradle --version
      
      - name: Generate icons
        run: |
          python3 -c "
          import os
          from PIL import Image, ImageDraw, ImageFont
          sizes = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
          for folder,size in sizes.items():
              os.makedirs(f'app/src/main/res/{folder}', exist_ok=True)
              img=Image.new('RGBA',(size,size),(0,0,0,0))
              draw=ImageDraw.Draw(img)
              p=size//12
              draw.rounded_rectangle([p,p,size-p,size-p],radius=size//6,fill=(255,107,107,255))
              try:
                  font=ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf',size//2)
              except:
                  font=ImageFont.load_default()
              bbox=draw.textbbox((0,0),'W',font=font)
              tw,th=bbox[2]-bbox[0],bbox[3]-bbox[1]
              draw.text(((size-tw)//2,(size-th)//2-size//20),'W',fill=(255,255,255,255),font=font)
              img.save(f'app/src/main/res/{folder}/ic_launcher.png')
              img.save(f'app/src/main/res/{folder}/ic_launcher_round.png')
          print('done')
          "
      
      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-amazon-corretto
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          export PATH=$PATH:$(pwd)/gradle-8.2/bin
          gradle assembleDebug --stacktrace
      
      - name: Upload APK
        run: |
          echo "APK built successfully"
          ls -la app/build/outputs/apk/debug/
