name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android licenses
      run: |
        yes | sdkmanager --licenses || true

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Generate Gradle Wrapper
      run: |
        # 下载并设置 Gradle Wrapper
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar || true

        # 如果下载失败，使用本地 gradle 生成
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          if command -v gradle &> /dev/null; then
            gradle wrapper --gradle-version 8.2
          else
            # 安装 gradle
            sudo apt-get update
            sudo apt-get install -y gradle
            gradle wrapper --gradle-version 8.2
          fi
        fi

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Generate app icons
      run: |
        python3 -c "
import os
from PIL import Image, ImageDraw, ImageFont

sizes = {
    'mipmap-mdpi': 48,
    'mipmap-hdpi': 72,
    'mipmap-xhdpi': 96,
    'mipmap-xxhdpi': 144,
    'mipmap-xxxhdpi': 192,
}

for folder, size in sizes.items():
    os.makedirs(f'app/src/main/res/{folder}', exist_ok=True)

    # 创建图标
    img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
    draw = ImageDraw.Draw(img)

    # 绘制圆角矩形背景
    padding = size // 12
    draw.rounded_rectangle(
        [padding, padding, size - padding, size - padding],
        radius=size // 6,
        fill=(255, 107, 107, 255)
    )

    # 绘制 W 字母
    try:
        font = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf', size // 2)
    except:
        font = ImageFont.load_default()

    bbox = draw.textbbox((0, 0), 'W', font=font)
    text_w = bbox[2] - bbox[0]
    text_h = bbox[3] - bbox[1]
    x = (size - text_w) // 2
    y = (size - text_h) // 2 - size // 20

    draw.text((x, y), 'W', fill=(255, 255, 255, 255), font=font)

    img.save(f'app/src/main/res/{folder}/ic_launcher.png')
    img.save(f'app/src/main/res/{folder}/ic_launcher_round.png')

print('Icons generated successfully')
"

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: WallpaperPlus-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
      continue-on-error: true

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: WallpaperPlus-release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30 
