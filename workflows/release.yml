name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

    - name: Generate Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar || true
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          sudo apt-get update && sudo apt-get install -y gradle
          gradle wrapper --gradle-version 8.2
        fi

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Generate app icons
      run: |
        python3 -c "
import os
from PIL import Image, ImageDraw, ImageFont

sizes = {
    'mipmap-mdpi': 48,
    'mipmap-hdpi': 72,
    'mipmap-xhdpi': 96,
    'mipmap-xxhdpi': 144,
    'mipmap-xxxhdpi': 192,
}

for folder, size in sizes.items():
    os.makedirs(f'app/src/main/res/{folder}', exist_ok=True)
    img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
    draw = ImageDraw.Draw(img)
    padding = size // 12
    draw.rounded_rectangle([padding, padding, size - padding, size - padding], radius=size // 6, fill=(255, 107, 107, 255))
    try:
        font = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf', size // 2)
    except:
        font = ImageFont.load_default()
    bbox = draw.textbbox((0, 0), 'W', font=font)
    text_w = bbox[2] - bbox[0]
    text_h = bbox[3] - bbox[1]
    draw.text(((size - text_w) // 2, (size - text_h) // 2 - size // 20), 'W', fill=(255, 255, 255, 255), font=font)
    img.save(f'app/src/main/res/{folder}/ic_launcher.png')
    img.save(f'app/src/main/res/{folder}/ic_launcher_round.png')
print('Icons generated')
"

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/*.apk
        name: WallpaperPlus ${{ github.ref_name || github.event.inputs.version }}
        body: |
          ## WallpaperPlus 壁纸增强模块

          ### 功能特性
          - 🎨 **光栅壁纸** - 多层视差景深效果
          - 🎵 **锁屏歌词** - 支持网易云/QQ音乐/酷狗/Spotify/Apple Music
          - 🔄 **3D壁纸晃动** - 陀螺仪驱动的3D透视变换

          ### 使用说明
          1. 安装 APK
          2. 在 LSPosed 中启用模块
          3. 勾选 SystemUI 和桌面作用域
          4. 勾选需要歌词支持的音乐应用
          5. 重启目标应用生效

          ### 系统要求
          - Android 9.0+ (API 28+)
          - LSPosed / EdXposed / 其他 Xposed 框架
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
